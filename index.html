<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Chat Assistant</title>

    <!-- Fonts -->
    <link
      href="https://fonts.googleapis.com/icon?family=Material+Icons"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;500;700&display=swap"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Playfair+Display&display=swap"
      rel="stylesheet"
    />

    <!-- Styles -->
    <link rel="stylesheet" href="style.css" />
    <link rel="icon" href="img/loreal-logo.png" />
  </head>

  <body>
    <!-- L'Oreal Header -->
    <header style="text-align: center; margin-bottom: 20px">
      <h1
        style="
          font-family: &quot;Playfair Display&quot;, serif;
          letter-spacing: 4px;
          margin: 0;
        "
      >
        L’ORÉAL
      </h1>
      <p style="font-size: 12px; letter-spacing: 6px; margin: 0">PARIS</p>
    </header>

    <!-- Chat Area -->
    <main>
      <section class="chatbox">
        <div id="chatWindow" class="chat-window">
          <!-- messages will be appended here via JS -->
        </div>

        <form id="chatForm" class="chat-form">
          <label for="userInput" class="visually-hidden">Message</label>
          <input
            id="userInput"
            name="userInput"
            type="text"
            placeholder="Ask me about products or routines…"
            autocomplete="off"
            required
          />
        </form>
      </section>
    </main>

    <script src="script.js"></script>
  </body>
</html>
